---
# ============================================
# ANSIBLE VAULT - ENCRYPTED SECRETS
# ============================================
# Encrypt this file: ansible-vault encrypt secrets.yml
# Edit: ansible-vault edit secrets.yml
# View: ansible-vault view secrets.yml

# SMTP Password (encrypted)
vault_smtp_password: "CHANGE_ME_ENCRYPT_THIS"

# Slack Webhook (encrypted)
vault_slack_webhook: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

# Microsoft Teams Webhook (encrypted)
vault_teams_webhook: "https://outlook.office.com/webhook/YOUR/WEBHOOK/URL"

# Database Credentials (encrypted)
vault_db_username: "app_user"
vault_db_password: "CHANGE_ME_ENCRYPT_THIS"

# Redis Password (encrypted)
vault_redis_password: "CHANGE_ME_ENCRYPT_THIS"

# API Keys (encrypted)
vault_api_key: "CHANGE_ME_ENCRYPT_THIS"

# Jenkins API Token (encrypted)
vault_jenkins_token: "CHANGE_ME_ENCRYPT_THIS"

# Git Credentials (encrypted)
vault_git_username: "jenkins"
vault_git_token: "CHANGE_ME_ENCRYPT_THIS"
